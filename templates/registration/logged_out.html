<!DOCTYPE html>
<html lang="en">
<head>

    <title>Logged Out - TripTrak</title>
    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

        <a href="{% url 'login' %}" class="inline-flex items-center justify-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors w-full sm:w-auto">
