<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trip Trak - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0e1628] min-h-screen flex items-center justify-center text-white">
    <div class="bg-[#1c253a] p-8 rounded-xl shadow-md w-full max-w-md space-y-6">
        <h1 class="text-3xl font-bold text-center">
            <span class="text-blue-500">Trip</span> Trak
        </h1>
        <h2 class="text-center font-semibold">Create an Account</h2>

        <form method="POST" action="{% url 'signup' %}" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label for="id_username" class="block text-sm mb-1 font-medium">Username</label>
                <input type="text" name="username" id="id_username" class="w-full px-3 py-2 rounded bg-white text-black" required>
                {% for error in form.username.errors %}
                    <p class="text-sm text-red-400">{{ error }}</p>
                {% endfor %}
            </div>

            <!-- Password1 -->
            <div>
                <label for="id_password1" class="block text-sm mb-1 font-medium">Password</label>
                <input type="password" name="password1" id="id_password1" class="w-full px-3 py-2 rounded bg-white text-black" required>
                {% for error in form.password1.errors %}
                    <p class="text-sm text-red-400">{{ error }}</p>
                {% endfor %}
            </div>

            <!-- Password2 -->
            <div>
                <label for="id_password2" class="block text-sm mb-1 font-medium">Confirm Password</label>
                <input type="password" name="password2" id="id_password2" class="w-full px-3 py-2 rounded bg-white text-black" required>
                {% for error in form.password2.errors %}
                    <p class="text-sm text-red-400">{{ error }}</p>
                {% endfor %}
            </div>

            <!-- Submit -->
            <button type="submit" class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded text-white font-semibold">
                Sign Up
            </button>
        </form>

        <p class="text-sm text-center text-gray-300">
            Already have an account? <a href="{% url 'login' %}" class="underline text-blue-400">Login</a>
        </p>
    </div>
</body>
</html>
